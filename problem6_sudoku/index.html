<!DOCTYPE html>
<html>
<head>
<title>Sudoku AI Solver</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#1e1e2f,#2c2c54);
    color: white;
}

h2 {
    margin-top: 20px;
}

table {
    margin: auto;
    border-collapse: collapse;
    animation: fadeIn 0.6s ease;
}

td {
    border: 1px solid #555;
}

input {
    width: 45px;
    height: 45px;
    text-align: center;
    font-size: 18px;
    border: none;
    outline: none;
    background: #2e2e48;
    color: white;
    transition: 0.2s;
}

input:focus {
    background: #444;
}

.fixed {
    background: #888;
    color: black;
}

.error {
    background: #ff4d4d !important;
}

.correct {
    background: #4dff88 !important;
}

button {
    margin: 10px;
    padding: 10px 15px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0099cc;
    transform: scale(1.1);
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<h2>Sudoku Solver (CSP)</h2>

<table id="grid"></table>

<button onclick="check()">Check</button>
<button onclick="solve()">Solve</button>

<script>
let puzzle = [
[5,3,0,0,7,0,0,0,0],
[6,0,0,1,9,5,0,0,0],
[0,9,8,0,0,0,0,6,0],
[8,0,0,0,6,0,0,0,3],
[4,0,0,8,0,3,0,0,1],
[7,0,0,0,2,0,0,0,6],
[0,6,0,0,0,0,2,8,0],
[0,0,0,4,1,9,0,0,5],
[0,0,0,0,8,0,0,7,9]
];

let grid = document.getElementById("grid");

for(let i=0;i<9;i++){
    let row = grid.insertRow();
    for(let j=0;j<9;j++){
        let cell = row.insertCell();
        let input = document.createElement("input");

        if(puzzle[i][j] !== 0){
            input.value = puzzle[i][j];
            input.disabled = true;
            input.classList.add("fixed");
        }

        cell.appendChild(input);
    }
}

function getBoard(){
    let board = [];
    for(let i=0;i<9;i++){
        let row = [];
        for(let j=0;j<9;j++){
            let val = grid.rows[i].cells[j].firstChild.value;
            row.push(val ? parseInt(val) : 0);
        }
        board.push(row);
    }
    return board;
}

function clearHighlights(){
    for(let i=0;i<9;i++){
        for(let j=0;j<9;j++){
            let input = grid.rows[i].cells[j].firstChild;
            input.classList.remove("error","correct");
        }
    }
}

function check(){
    let board = getBoard();
    clearHighlights();
    let valid = true;

    for(let i=0;i<9;i++){
        for(let j=0;j<9;j++){
            let val = board[i][j];
            if(val === 0) continue;

            board[i][j] = 0;

            if(!isValid(board,i,j,val)){
                grid.rows[i].cells[j].firstChild.classList.add("error");
                valid = false;
            } else {
                grid.rows[i].cells[j].firstChild.classList.add("correct");
            }

            board[i][j] = val;
        }
    }

    setTimeout(()=>clearHighlights(), 800);

    if(valid && board.flat().every(x=>x!==0)){
        alert("🎉 Perfect Solution!");
    } else if(valid){
        alert("👍 Looks good so far!");
    } else {
        alert("❌ There are mistakes!");
    }
}

function isValid(board,r,c,num){
    for(let i=0;i<9;i++){
        if(board[r][i]===num || board[i][c]===num) return false;
    }

    let sr = Math.floor(r/3)*3;
    let sc = Math.floor(c/3)*3;

    for(let i=0;i<3;i++){
        for(let j=0;j<3;j++){
            if(board[sr+i][sc+j]===num) return false;
        }
    }
    return true;
}

function solveSudoku(board){
    for(let i=0;i<9;i++){
        for(let j=0;j<9;j++){
            if(board[i][j]===0){
                for(let n=1;n<=9;n++){
                    if(isValid(board,i,j,n)){
                        board[i][j]=n;
                        if(solveSudoku(board)) return true;
                        board[i][j]=0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}

function solve(){
    let board = getBoard();
    if(solveSudoku(board)){
        for(let i=0;i<9;i++){
            for(let j=0;j<9;j++){
                grid.rows[i].cells[j].firstChild.value = board[i][j];
            }
        }
        alert("✨ Solved!");
    } else {
        alert("No solution");
    }
}
</script>

</body>
</html>
